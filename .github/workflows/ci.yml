name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade "ruff>=0.4.0"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      JAX_PLATFORMS: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ALEM (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: python -c "import alem; print('alem', alem.__version__)"

      - name: Env reset/step rollout
        run: python examples/random_rl_agent.py --coord easy --steps 30 --log-every 0

      - name: Fast environment tests
        run: python -m unittest alem.tests.test_env_factory -v
