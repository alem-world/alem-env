name: Publish to PyPI

# Publishes alem-env to PyPI only when a new version is released:
#   - pushing a tag that looks like a version (v0.1.0, v1.2.3, v1.2.3rc1), or
#   - publishing a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token secret is stored in the repo.
# One-time setup: on https://pypi.org add a trusted publisher for project "alem-env"
# pointing at this repo, workflow "publish.yml", environment "pypi".

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $pkg. Bump the version in pyproject.toml before tagging."
            exit 1
          fi

      - name: Check distribution metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alem-env
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
