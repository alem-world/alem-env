# Weights & Biases configuration
WANDB_MODE: "online" # Change to "online" for logging and include appropriate ENTITY and PROJECT arguments
ENTITY: ""
PROJECT: ""
RUN_NAME: "PQN - Base"

# Environment configuration
ENV_NAME: "Alem-Coop-Symbolic" # Can be changed to "Alem-Coop-Symbolic", "Alem-Coop-Pixels"

# VDN not ideal for not shared reward, but we also tried shared reward =true and it was worse.
SHARED_REWARD: false      # true=team reward, false=individual rewards

# Soft Specialization (set SOFT_SPECIALIZATION=true to enable)
# When false (default): hard gates - only specialists can perform role-specific actions
# When true: soft gates - anyone can attempt, but specialists have higher success rate
SOFT_SPECIALIZATION: true
SPECIALIST_EFFICIENCY: 1.0      # Success rate for specialists (100%)
# non specialist efficiency is sampled when TRAINING_COORDINATION_DIFFICULTY=sampled
NON_SPECIALIST_EFFICIENCY: 0.2  # Success rate for non-specialists (20%)
SCALE_BASE_DIFFICULTY: false  # whether to scale base difficulty with α (see alem_coop/alem_state.py for details)

TRAINING_COORDINATION_DIFFICULTY: easy


# Communication channels (MPE-style discrete messages)
# 0 = disabled (no extra actions/obs), >0 = num one-hot comm dimensions per agent
NUM_COMM_CHANNELS: 0

# Action masking — when true, invalid actions are masked in the policy
ACTION_MASKING: true

# Model parameters
ALG_NAME: "pqn-vdn-rnn"
HIDDEN_SIZE: 1024
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: true
# we started with - https://github.com/BaselOmari/MA-Craftax/blob/e1d94376eb1354342d3066849b7e045838419a50/baselines/pqn_vdn_rnn.py#L187
# then swept LR, NUM_MINIBATCHES, NORM_INPUT, NORM_TYPE, EPS_FINISH and NUM_EPOCHS - best combination was LR=0.00005, NUM_MINIBATCHES=16, NORM_INPUT=false, NORM_TYPE=layer_norm, EPS_FINISH=0.01 and NUM_EPOCHS=4
# we also tried hyps from https://github.com/mttga/purejaxql/blob/47af6d7b35c89ddfe633aaf7341bdb8964cb7cce/purejaxql/config/alg/pqn_rnn_craftax.yaml
NORM_INPUT: False # performance was worse with true, but typically true in original repo
NORM_TYPE: "layer_norm"

# Training parameters
# sweeps NUM_MINIBATCHES=4,16 NORM_INPUT=true,false EPS_FINISH=0.01,0.01,0.005 NORM_TYPE=layer_norm,bath_norm also tried GRU instead of lstm 
# instead of lstm, but GRU was much worse
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 512
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.0
EPS_FINISH: 0.01 # also tried 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 16 # also tried 4,8 but 16 was best
NUM_EPOCHS: 4
LR: 0.00005 # sweeped 0.0003 0.0001, 0.00005, 0.00001 - 0.00005 was best
MAX_GRAD_NORM: 0.5
LR_LINEAR_DECAY: true
REW_SCALE: 1.0
GAMMA: 0.99
LAMBDA: 0.9 # sweeped 0.5, 0.7 and 0.9 - 0.9 was best

# Seed configuration
NUM_SEEDS: 1
SEED: 0

# Final evaluation — matches LLM eval (eval_alem.py: num_episodes=20, max_steps=10000)
TEST_NUM_EPISODES: 20       # episodes per difficulty (sequential, one at a time)
TEST_MAX_STEPS: 10000       # max steps per episode
EVAL_DIFFICULTIES:
  - easy

RUN_TAGS: []